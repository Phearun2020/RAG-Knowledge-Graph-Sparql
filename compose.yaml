services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: kg-rag-fuseki
    ports:
      - "3031:3030"
    environment:
      ADMIN_PASSWORD: localpass
      FUSEKI_DATASET_1: kg
      JVM_ARGS: -Xmx2g
    volumes:
      - fuseki-data:/fuseki
      - ./data:/staging:ro

volumes:
  fuseki-data:
